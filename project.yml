name: AstroViewingConditions
options:
  bundleIdPrefix: com.astroviewing
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: NO
    CODE_SIGN_IDENTITY: "iPhone Developer"
    DEVELOPMENT_TEAM: ALV53VY374

packages:
  SunCalc:
    url: https://github.com/nikolajjensen/SunCalc.git
    from: "1.0.0"

targets:
  SharedCode:
    type: framework
    platform: [iOS, watchOS]
    sources:
      - Sources/SharedCode
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.astroviewing.conditions.SharedCode
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "iPhone Developer"
        CODE_SIGNING_ALLOWED: YES
    dependencies:
      - package: SunCalc

  AstroViewingConditions:
    type: application
    platform: iOS
    sources:
      - Sources/AstroViewingConditions
      - Sources/App
    resources:
      - Sources/AstroViewingConditions/Resources/Assets.xcassets
      - Sources/App/PrivacyInfo.xcprivacy
    settings:
      base:
        INFOPLIST_FILE: Sources/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.astroviewing.conditions
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        CODE_SIGN_ENTITLEMENTS: Sources/App/AstroViewingConditions.entitlements
        DEVELOPMENT_TEAM: ALV53VY374
    dependencies:
      - target: SharedCode_iOS
        embed: true
        codeSignOnCopy: true
      - target: NightConditionsWidget
        embed: true
        codeSignOnCopy: true
      - target: AstroViewingConditionsWatch
        embed: true
        codeSignOnCopy: true

  NightConditionsWidget:
    type: app-extension
    platform: iOS
    sources:
      - Sources/Widgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.astroviewing.conditions.NightConditionsWidget
        INFOPLIST_FILE: Sources/Widgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Widgets/NightConditionsWidget.entitlements
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.1.0"
        SWIFT_ENABLE_EXPLICIT_MODULES: NO
        DEVELOPMENT_TEAM: ALV53VY374
    dependencies:
      - target: SharedCode_iOS

  AstroViewingConditionsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/AstroViewingConditionsTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: Tests/AstroViewingConditionsTests/AstroViewingConditionsTests.entitlements
    dependencies:
      - target: AstroViewingConditions

  AstroViewingConditionsWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - Sources/WatchApp
    resources:
      - Sources/WatchApp/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.astroviewing.conditions.watch
        INFOPLIST_FILE: Sources/WatchApp/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Sources/WatchApp/AstroViewingConditionsWatch.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "1"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
        DEVELOPMENT_TEAM: ALV53VY374
    dependencies:
      - target: SharedCode_watchOS
        embed: true
        codeSignOnCopy: true
      - target: AstroViewingConditionsWatchWidget
        embed: true
        codeSignOnCopy: true

  AstroViewingConditionsWatchWidget:
    type: app-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - Sources/WatchWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.astroviewing.conditions.watch.widget
        INFOPLIST_FILE: Sources/WatchWidget/Info.plist
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.1.0"
        CODE_SIGN_ENTITLEMENTS: Sources/WatchWidget/AstroViewingConditionsWatchWidget.entitlements
        DEVELOPMENT_TEAM: ALV53VY374
    dependencies:
      - target: SharedCode_watchOS

schemes:
  AstroViewingConditions:
    build:
      targets:
        AstroViewingConditions: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AstroViewingConditionsTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  AstroViewingConditionsWatch:
    build:
      targets:
        AstroViewingConditionsWatch: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
